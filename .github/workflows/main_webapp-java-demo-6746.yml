# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: 'Build and deploy WAR app to Azure Web App: webapp-java-demo-6746'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Java version
      uses: actions/setup-java@v1
      with:
        java-version: '11'
        
    - name: Build with Maven
      run: mvn clean install
   
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'webapp-java-demo-6746'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_0e46bae277334606b2760c8defed6e90 }}
        package: '${{ github.workspace }}/target/*.war'
